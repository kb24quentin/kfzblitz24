services:
  intranet-db:
    image: postgres:16-alpine
    container_name: intranet_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: intranet
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: intranet
    volumes:
      - /opt/kfzblitz24/data/prod/intranet-postgres:/var/lib/postgresql/data
    networks:
      - prod_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intranet -d intranet"]
      interval: 5s
      timeout: 5s
      retries: 10

  intranet:
    build:
      context: .
      dockerfile: Dockerfile
    image: kfzblitz24/intranet:prod
    container_name: intranet_prod
    restart: unless-stopped
    depends_on:
      intranet-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://intranet:${DB_PASSWORD}@intranet-db:5432/intranet
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: https://kfzblitz24-group.com
      NEXTAUTH_URL: https://kfzblitz24-group.com
      GOOGLE_SSO_CLIENT_ID: ${GOOGLE_SSO_CLIENT_ID}
      GOOGLE_SSO_CLIENT_SECRET: ${GOOGLE_SSO_CLIENT_SECRET}
      SSO_ALLOWED_DOMAIN: ${SSO_ALLOWED_DOMAIN:-kfzblitz24.de}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      SUPPORT_INTERNAL_URL: ${SUPPORT_INTERNAL_URL:-http://support_prod:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
    networks:
      - prod_internal
      - traefik_net
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_net
      - traefik.http.routers.intranet-prod.rule=Host(`kfzblitz24-group.com`)
      - traefik.http.routers.intranet-prod.entrypoints=websecure
      - traefik.http.routers.intranet-prod.tls=true
      - traefik.http.routers.intranet-prod.tls.certresolver=letsencrypt
      - traefik.http.services.intranet-prod.loadbalancer.server.port=3000

networks:
  prod_internal:
    external: true
  traefik_net:
    external: true
