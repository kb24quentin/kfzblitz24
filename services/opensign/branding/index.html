<head>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- ─── kfzBlitz24 Theme-Override ─────────────────────────────────────
       Überschreibt die daisyUI-CSS-Variablen für das 'opensigncss'-Theme
       mit den KB24-Markenfarben:
         primary  #0b3756  (dunkelblau)
         accent   #ff6600  (orange)
       Greift ohne Forking des Frontend-Bundles, weil daisyUI alle Farben
       als HSL-Variablen unter [data-theme="..."] expandiert.
  -->
  <style>
    [data-theme="opensigncss"] {
      --p:  207 77% 19%;    /* primary  = kfz dunkelblau */
      --pc: 0 0% 100%;      /* primary-content (Text auf Primary) */
      --s:  207 78% 14%;    /* secondary = noch dunklerer Blau (Sidebar) */
      --sc: 220 35% 92%;    /* secondary-content (hellgrauer Text) */
      --a:  24 100% 50%;    /* accent   = kfz orange */
      --ac: 0 0% 100%;      /* accent-content */
      --n:  207 40% 30%;    /* neutral  - muted blue */
      --nc: 220 35% 92%;
      --in: 207 80% 50%;    /* info */
      --inc: 0 0% 100%;
      --su: 142 70% 45%;    /* success */
      --suc: 0 0% 100%;
      --wa: 38 92% 50%;     /* warning */
      --wac: 0 0% 0%;
      --er: 0 84% 60%;      /* error */
      --erc: 0 0% 100%;
    }

    /* Login-Page Hintergrund + Branding-Akzent für Logo-Container */
    body, .op-bg-base-100 { background-color: #f8fafc; }

    /* OpenSign Social-Links + Branding raus (intern für KB24) */
    a[href*="github.com/opensignlabs"],
    a[href*="github.com/OpenSignLabs"],
    a[href*="linkedin.com/company/opensign"],
    a[href*="twitter.com/opensignlabs"],
    a[href*="x.com/opensignlabs"],
    a[href*="discord.com/invite"],
    a[href*="discord.gg/opensign"],
    a[href*="opensignlabs.com"]:not([href*="cdn.opensignlabs.com"]) {
      display: none !important;
    }
  </style>
</head>

<body>
  <div id="root" style="touch-action:pan-x pan-y;"></div>
</body>

</html>
