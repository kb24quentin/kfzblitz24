services:
  support-db:
    image: postgres:16-alpine
    container_name: support_db_staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: support
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: support
    volumes:
      - /opt/kfzblitz24/data/staging/support-postgres:/var/lib/postgresql/data
    networks:
      - staging_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support -d support"]
      interval: 5s
      timeout: 5s
      retries: 10

  support:
    build:
      context: .
      dockerfile: Dockerfile
    image: kfzblitz24/support:staging
    container_name: support_staging
    restart: unless-stopped
    depends_on:
      support-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://support:${DB_PASSWORD}@support-db:5432/support
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: https://support.staging.kfzblitz24-group.com
      NEXTAUTH_URL: https://support.staging.kfzblitz24-group.com
      RESEND_API_KEY: ${RESEND_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL}
      FROM_NAME: ${FROM_NAME}
      REPLY_TO_EMAIL: ${REPLY_TO_EMAIL}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET}
      GMAIL_REFRESH_TOKEN: ${GMAIL_REFRESH_TOKEN}
      GMAIL_USER_EMAIL: ${GMAIL_USER_EMAIL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      API_TOKEN: ${API_TOKEN}
      SLA_HOURS: ${SLA_HOURS:-24}
      DISABLE_GMAIL_SYNC: ${DISABLE_GMAIL_SYNC:-false}
      GOOGLE_SSO_CLIENT_ID: ${GOOGLE_SSO_CLIENT_ID}
      GOOGLE_SSO_CLIENT_SECRET: ${GOOGLE_SSO_CLIENT_SECRET}
      SSO_ALLOWED_DOMAIN: ${SSO_ALLOWED_DOMAIN:-kfzblitz24.de}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      RETOURE_API_URL: ${RETOURE_API_URL}
      RETOURE_API_TOKEN: ${RETOURE_API_TOKEN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
    networks:
      - staging_internal
      - traefik_net
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_net
      - traefik.http.routers.support-staging.rule=Host(`support.staging.kfzblitz24-group.com`)
      - traefik.http.routers.support-staging.entrypoints=websecure
      - traefik.http.routers.support-staging.tls=true
      - traefik.http.routers.support-staging.tls.certresolver=letsencrypt
      - traefik.http.services.support-staging.loadbalancer.server.port=3000

  support-cron:
    image: curlimages/curl:8.10.1
    container_name: support_cron_staging
    restart: unless-stopped
    depends_on:
      - support
    environment:
      API_TOKEN: ${API_TOKEN}
      GMAIL_POLL_SECONDS: ${GMAIL_POLL_SECONDS:-60}
      SLA_POLL_SECONDS: ${SLA_POLL_SECONDS:-300}
      TZ: Europe/Berlin
    networks:
      - staging_internal
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sleep 30
        LAST_SLA=/tmp/last-sla-run
        while true; do
          NOW=$$(date -Iseconds)
          echo "[cron] gmail-sync @ $$NOW"
          curl -sS -o /dev/null -w "  gmail-sync HTTP %{http_code} in %{time_total}s\n" \
            -X POST \
            -H "Authorization: Bearer $$API_TOKEN" \
            http://support:3000/api/cron/gmail-sync || echo "[cron] gmail-sync failed"

          # Run SLA check every SLA_POLL_SECONDS
          NOW_TS=$$(date +%s)
          LAST_TS=$$(cat $$LAST_SLA 2>/dev/null || echo 0)
          if [ $$((NOW_TS - LAST_TS)) -ge $$SLA_POLL_SECONDS ]; then
            echo "[cron] sla-check @ $$NOW"
            curl -sS -o /dev/null -w "  sla-check HTTP %{http_code} in %{time_total}s\n" \
              -X POST \
              -H "Authorization: Bearer $$API_TOKEN" \
              http://support:3000/api/cron/sla-check && echo $$NOW_TS > $$LAST_SLA || echo "[cron] sla failed"
          fi

          sleep $$GMAIL_POLL_SECONDS
        done

networks:
  staging_internal:
    external: true
  traefik_net:
    external: true
