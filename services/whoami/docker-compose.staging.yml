services:
  whoami:
    image: traefik/whoami:latest
    container_name: whoami_staging
    restart: unless-stopped
    networks:
      - traefik_net
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_net
      - traefik.http.routers.whoami-staging.rule=Host(`whoami.staging.kfzblitz24-group.com`)
      - traefik.http.routers.whoami-staging.entrypoints=websecure
      - traefik.http.routers.whoami-staging.tls=true
      - traefik.http.routers.whoami-staging.tls.certresolver=letsencrypt
      - traefik.http.services.whoami-staging.loadbalancer.server.port=80

networks:
  traefik_net:
    external: true
