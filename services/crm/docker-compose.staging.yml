services:
  crm-db:
    image: postgres:16-alpine
    container_name: crm_db_staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: crm
    volumes:
      - /opt/kfzblitz24/data/staging/crm-postgres:/var/lib/postgresql/data
    networks:
      - staging_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  crm:
    build:
      context: .
      dockerfile: Dockerfile
    image: kfzblitz24/crm:staging
    container_name: crm_staging
    restart: unless-stopped
    depends_on:
      crm-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://crm:${DB_PASSWORD}@crm-db:5432/crm
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: https://crm.staging.kfzblitz24-group.com
      NEXTAUTH_URL: https://crm.staging.kfzblitz24-group.com
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET}
      FROM_EMAIL: ${FROM_EMAIL}
      FROM_NAME: ${FROM_NAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
    networks:
      - staging_internal
      - traefik_net
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_net
      - traefik.http.routers.crm-staging.rule=Host(`crm.staging.kfzblitz24-group.com`)
      - traefik.http.routers.crm-staging.entrypoints=websecure
      - traefik.http.routers.crm-staging.tls=true
      - traefik.http.routers.crm-staging.tls.certresolver=letsencrypt
      - traefik.http.services.crm-staging.loadbalancer.server.port=3000

networks:
  staging_internal:
    external: true
  traefik_net:
    external: true
