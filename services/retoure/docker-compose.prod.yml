services:
  retoure-db:
    image: postgres:16-alpine
    container_name: retoure_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: retoure
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: retoure
    volumes:
      - /opt/kfzblitz24/data/prod/retoure-postgres:/var/lib/postgresql/data
    networks:
      - prod_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retoure -d retoure"]
      interval: 5s
      timeout: 5s
      retries: 10

  retoure:
    build:
      context: .
      dockerfile: Dockerfile
    image: kfzblitz24/retoure:prod
    container_name: retoure_prod
    restart: unless-stopped
    depends_on:
      retoure-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://retoure:${DB_PASSWORD}@retoure-db:5432/retoure
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: https://rma.kfzblitz24-group.com
      NEXTAUTH_URL: https://rma.kfzblitz24-group.com
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      WEBISCO_HOST: ${WEBISCO_HOST:-}
      WEBISCO_USERNAME: ${WEBISCO_USERNAME:-}
      WEBISCO_PASSWORD: ${WEBISCO_PASSWORD:-}
      WEBISCO_ADMIN_ID: ${WEBISCO_ADMIN_ID:-}
      WEBISCO_DEMO_MODE: ${WEBISCO_DEMO_MODE:-}
      WEBISCO_DEBUG: ${WEBISCO_DEBUG:-}
      DODAJPACZKE_BASE_URL: ${DODAJPACZKE_BASE_URL:-}
      DODAJPACZKE_LOGIN: ${DODAJPACZKE_LOGIN:-}
      DODAJPACZKE_PASSWORD: ${DODAJPACZKE_PASSWORD:-}
      DODAJPACZKE_SHIPPER_ID: ${DODAJPACZKE_SHIPPER_ID:-}
      DODAJPACZKE_WAREHOUSE_NAME: ${DODAJPACZKE_WAREHOUSE_NAME:-}
      DODAJPACZKE_WAREHOUSE_ZIP: ${DODAJPACZKE_WAREHOUSE_ZIP:-}
      DODAJPACZKE_LABEL_FEE_NET: ${DODAJPACZKE_LABEL_FEE_NET:-}
      API_TOKEN: ${API_TOKEN:-}
      # Customer-Portal Public URL (für Prefill-Hand-off-Links)
      RETOURE_PUBLIC_URL: ${RETOURE_PUBLIC_URL:-}
      SLA_THRESHOLD_HOURS: ${SLA_THRESHOLD_HOURS:-}
      SLA_MAIL_TO: ${SLA_MAIL_TO:-}
      SLA_MAIL_FROM: ${SLA_MAIL_FROM:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    networks:
      - prod_internal
      - traefik_net
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_net
      # Customer-Frontend
      - traefik.http.routers.retoure-prod.rule=Host(`retoure.kfzblitz24-group.com`)
      - traefik.http.routers.retoure-prod.entrypoints=websecure
      - traefik.http.routers.retoure-prod.tls=true
      - traefik.http.routers.retoure-prod.tls.certresolver=letsencrypt
      - traefik.http.routers.retoure-prod.service=retoure-prod
      # RMA Admin-Dashboard
      - traefik.http.routers.rma-prod.rule=Host(`rma.kfzblitz24-group.com`)
      - traefik.http.routers.rma-prod.entrypoints=websecure
      - traefik.http.routers.rma-prod.tls=true
      - traefik.http.routers.rma-prod.tls.certresolver=letsencrypt
      - traefik.http.routers.rma-prod.service=retoure-prod
      # PDA-API (Native Android-App)
      - traefik.http.routers.pda-prod.rule=Host(`pda.rma.kfzblitz24-group.com`)
      - traefik.http.routers.pda-prod.entrypoints=websecure
      - traefik.http.routers.pda-prod.tls=true
      - traefik.http.routers.pda-prod.tls.certresolver=letsencrypt
      - traefik.http.routers.pda-prod.service=retoure-prod
      - traefik.http.services.retoure-prod.loadbalancer.server.port=3000

  retoure-cron:
    image: curlimages/curl:8.10.1
    container_name: retoure_cron_prod
    restart: unless-stopped
    depends_on:
      - retoure
    environment:
      API_TOKEN: ${API_TOKEN}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-1800}
      TZ: Europe/Berlin
    networks:
      - prod_internal
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sleep 30
        LAST_SLA=/tmp/last-sla-day
        while true; do
          NOW=$$(date -Iseconds)
          echo "[cron] poll-carriers @ $$NOW"
          curl -sS -o /dev/null -w "  HTTP %{http_code} in %{time_total}s\n" -X POST -H "Authorization: Bearer $$API_TOKEN" http://retoure:3000/api/cron/poll-carriers || echo "[cron] carrier-poll failed"

          HOUR=$$(date +%H)
          TODAY=$$(date +%Y-%m-%d)
          if [ "$$HOUR" = "09" ] && [ "$$(cat $$LAST_SLA 2>/dev/null)" != "$$TODAY" ]; then
            echo "[cron] sla-overdue @ $$NOW"
            curl -sS -o /dev/null -w "  HTTP %{http_code} in %{time_total}s\n" -X POST -H "Authorization: Bearer $$API_TOKEN" http://retoure:3000/api/cron/sla-overdue && echo "$$TODAY" > $$LAST_SLA || echo "[cron] sla failed"
          fi

          sleep "$$POLL_INTERVAL_SECONDS"
        done

networks:
  prod_internal:
    external: true
  traefik_net:
    external: true
