services:
  retoure:
    build:
      context: .
      dockerfile: Dockerfile
    image: kfzblitz24/retoure:staging
    container_name: retoure_staging
    restart: unless-stopped
    environment:
      WEBISCO_HOST: ${WEBISCO_HOST:-}
      WEBISCO_USERNAME: ${WEBISCO_USERNAME:-}
      WEBISCO_PASSWORD: ${WEBISCO_PASSWORD:-}
      WEBISCO_ADMIN_ID: ${WEBISCO_ADMIN_ID:-}
      WEBISCO_DEMO_MODE: ${WEBISCO_DEMO_MODE:-}
    networks:
      - staging_internal
      - traefik_net
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_net
      - traefik.http.routers.retoure-staging.rule=Host(`retoure.staging.kfzblitz24-group.com`)
      - traefik.http.routers.retoure-staging.entrypoints=websecure
      - traefik.http.routers.retoure-staging.tls=true
      - traefik.http.routers.retoure-staging.tls.certresolver=letsencrypt
      - traefik.http.services.retoure-staging.loadbalancer.server.port=3000

networks:
  staging_internal:
    external: true
  traefik_net:
    external: true
