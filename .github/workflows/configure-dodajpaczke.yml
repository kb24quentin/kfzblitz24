name: Configure retoure dodajpaczke env (one-off)

# Vorübergehender Helper — schreibt die DODAJPACZKE_* Variablen in
# /opt/kfzblitz24/services/retoure/.env.staging und recreate den Container.
# Wird genutzt um die Fail2ban-Sperre des Entwickler-Laptops zu umgehen.
# Nach erfolgreichem Run sollte dieser Workflow wieder entfernt werden.

on:
  workflow_dispatch:
    inputs:
      login:
        description: "DODAJPACZKE_LOGIN"
        required: true
        type: string
      password:
        description: "DODAJPACZKE_PASSWORD"
        required: true
        type: string
      shipper_id:
        description: "DODAJPACZKE_SHIPPER_ID (numeric)"
        required: true
        type: string

jobs:
  configure:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Write env + recreate
        env:
          LOGIN: ${{ inputs.login }}
          # The password input is referenced via env so its value never appears
          # in the rendered shell command line (it would otherwise be visible
          # in the actions log even if marked as secret).
          DODAJPACZKE_PASSWORD: ${{ inputs.password }}
          SHIPPER_ID: ${{ inputs.shipper_id }}
        run: |
          # Mask the password explicitly so it's redacted in any future log lines.
          echo "::add-mask::$DODAJPACZKE_PASSWORD"

          # Send the env block through stdin so it never enters argv.
          ssh deploy@${{ secrets.VPS_HOST }} \
            "cat >> /opt/kfzblitz24/services/retoure/.env.staging && \
             chmod 600 /opt/kfzblitz24/services/retoure/.env.staging" <<EOF

          # dodajpaczke.eu — DHL Retoure (set via configure-dodajpaczke workflow)
          DODAJPACZKE_LOGIN=$LOGIN
          DODAJPACZKE_PASSWORD=$DODAJPACZKE_PASSWORD
          DODAJPACZKE_SHIPPER_ID=$SHIPPER_ID
          EOF

          # Recreate the container so the new env is picked up.
          ssh deploy@${{ secrets.VPS_HOST }} bash <<'REMOTE'
          set -e
          cd /opt/kfzblitz24/services/retoure
          docker compose -p retoure_staging -f docker-compose.staging.yml --env-file .env.staging up -d --force-recreate
          sleep 4
          docker ps --format 'table {{.Names}}\t{{.Status}}' | grep retoure || true
          REMOTE
